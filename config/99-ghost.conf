# /etc/sysctl.d/99-ghost.conf
# Kernel hardening for Ghost Machine

# Enable SysRq for emergency shutdown combos
kernel.sysrq = 1

# Disable core dumps
fs.suid_dumpable = 0
kernel.core_pattern = |/bin/false

# Restrict dmesg to root
kernel.dmesg_restrict = 1

# Restrict ptrace to own child processes only
kernel.yama.ptrace_scope = 2

# Suppress kernel log to console
kernel.printk = 3 3 3 3

# Randomize virtual address space (ASLR)
kernel.randomize_va_space = 2

# ── Network Hardening ──────────────────────────────────────────────────────

# SYN flood protection
net.ipv4.tcp_syncookies = 1

# Reverse path filtering (prevent IP spoofing)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# No sending redirects
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# No accepting redirects
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0

# No accepting source-routed packets
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# Log martian packets (impossible source addresses)
net.ipv4.conf.all.log_martians = 1

# Disable IPv6 completely (critical when using Tor — prevents IPv6 leaks)
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# Ignore ICMP broadcasts
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP errors
net.ipv4.icmp_ignore_bogus_error_responses = 1
